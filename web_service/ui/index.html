<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>JZ-AnyLabeling</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>JZ-AnyLabeling</h1>
        </header>

        <main>
            <!-- Left Panel: Upload & Settings -->
            <div class="left-panel">
                <!-- Upload Section -->
                <section class="panel" id="upload-panel">
                    <div class="upload-header">
                        <h2>上传文件</h2>
                        <span class="file-count" id="file-count">0 个文件</span>
                    </div>
                    <div class="upload-area-compact">
                        <input type="file" id="file-input" multiple accept="image/*,video/*" hidden>
                        <button class="btn btn-primary btn-upload" id="select-files-btn">
                            📁 选择文件
                        </button>
                        <span class="upload-hint">支持图片和视频</span>
                    </div>
                    <div class="video-settings" id="video-settings">
                        <label>
                            <span>视频帧间隔:</span>
                            <input type="number" id="frame-interval" value="30" min="1" max="1000">
                            <span class="setting-hint">每多少帧取1帧 (帧率=fps/间隔)</span>
                        </label>
                    </div>
                </section>

                <!-- Model Selection -->
                <section class="panel" id="model-panel">
                    <h2>选择模型</h2>
                    <div class="model-filters">
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="detection">检测</button>
                        <button class="filter-btn" data-filter="segmentation">分割</button>
                        <button class="filter-btn" data-filter="pose">姿态</button>
                        <button class="filter-btn" data-filter="ocr">OCR</button>
                        <button class="filter-btn" data-filter="classification">分类</button>
                        <button class="filter-btn" data-filter="grounding">Grounding</button>
                    </div>
                    <div class="model-grid" id="model-grid">
                        <div class="loading">加载中...</div>
                    </div>
                </section>

                <!-- Format Selection -->
                <section class="panel" id="format-panel">
                    <h2>输出格式</h2>
                    <div class="format-grid" id="format-grid"></div>
                </section>

                <!-- Labeling Mode Selection -->
                <section class="panel" id="labeling-mode-panel">
                    <h2>标注模式</h2>
                    <div class="labeling-mode-options">
                        <label class="radio-card">
                            <input type="radio" name="labeling_mode" value="auto" checked>
                            <div class="radio-content">
                                <span class="radio-title">自动识别</span>
                                <span class="radio-desc">自动识别所有检测到的类别</span>
                            </div>
                        </label>
                        <label class="radio-card">
                            <input type="radio" name="labeling_mode" value="configured">
                            <div class="radio-content">
                                <span class="radio-title">配置类别</span>
                                <span class="radio-desc">只标注指定的类别</span>
                            </div>
                        </label>
                    </div>
                    <div class="specific-classes-input hidden" id="specific-classes-container">
                        <label for="specific-classes">类别名称 (逗号分隔):</label>
                        <input type="text" id="specific-classes" placeholder="如: person, car, truck">
                        <span class="setting-hint">只标注这些类别，其他类别会被忽略</span>
                    </div>
                </section>

                <!-- Save Path -->
                <section class="panel" id="save-panel">
                    <h2>保存路径</h2>
                    <div class="save-path-input">
                        <button type="button" class="btn btn-secondary" id="select-folder-btn">
                            📁 选择文件夹
                        </button>
                        <input type="file" id="folder-input" webkitdirectory hidden>
                        <span id="save-path-display">默认保存到 results 目录</span>
                    </div>
                </section>

                <!-- Process Button -->
                <section class="panel" id="process-panel">
                    <button class="btn btn-large btn-primary" id="process-btn" disabled>
                        开始处理
                    </button>
                </section>
            </div>

            <!-- Right Panel: Preview -->
            <div class="right-panel">
                <!-- Mode Toggle -->
                <section class="panel" id="mode-toggle-panel">
                    <div class="preview-mode-toggle">
                        <button class="mode-btn active" id="labeling-mode-btn" data-mode="labeling">
                            📝 标注模式
                        </button>
                        <button class="mode-btn" id="preview-mode-btn" data-mode="preview">
                            👁 预览模式
                        </button>
                    </div>
                </section>

                <!-- Labeling Panel (default) -->
                <section class="panel preview-panel" id="labeling-panel">
                    <h2>预览</h2>
                    <div class="preview-container" id="preview-container">
                        <div class="preview-placeholder" id="preview-placeholder">
                            <span>👆 请上传文件</span>
                        </div>
                        <div class="preview-content hidden" id="preview-content">
                            <div class="file-list-compact" id="file-list"></div>
                            <div class="preview-main" id="preview-main">
                                <img id="preview-image" src="" alt="Preview" class="hidden">
                                <video id="preview-video" controls class="hidden"></video>
                            </div>
                        </div>
                    </div>
                    <div class="preview-info" id="preview-info"></div>
                </section>

                <!-- Annotation Preview Panel (for preview mode) -->
                <section class="panel hidden" id="annotation-preview-panel">
                    <h2>标注预览</h2>
                    <div class="folder-select-area">
                        <button class="btn btn-secondary" id="select-folder-preview-btn">
                            📁 选择文件夹
                        </button>
                        <div class="folder-path" id="preview-folder-path">加载中...</div>
                    </div>
                    <div class="preview-canvas-container" id="annotation-canvas-container">
                        <div class="preview-placeholder" id="annotation-preview-placeholder">
                            <span>👆 请先选择文件夹或点击"默认路径"</span>
                        </div>
                        <div class="hidden" id="annotation-preview-content">
                            <img id="annotation-preview-image" src="" alt="Annotation Preview">
                        </div>
                        <svg class="annotation-overlay" id="annotation-overlay"></svg>
                    </div>
                    <div class="annotation-controls hidden" id="annotation-controls">
                        <div class="annotation-nav">
                            <button class="btn" id="annotation-prev-btn">◀ 上一张</button>
                            <span id="annotation-page-info">1 / 10</span>
                            <button class="btn" id="annotation-next-btn">下一张 ▶</button>
                        </div>
                        <div class="annotation-info">
                            <span class="shape-count" id="shape-count">0 个标注</span>
                        </div>
                    </div>
                    <div class="shape-list hidden" id="shape-list"></div>
                    <div class="annotation-summary hidden" id="annotation-summary">
                        <div class="summary-title">标注统计</div>
                        <div class="label-distribution" id="label-distribution"></div>
                    </div>
                </section>

                <!-- Progress -->
                <section class="panel hidden" id="progress-panel">
                    <h2>处理进度</h2>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text" id="progress-text">0%</div>
                    <div class="current-file" id="current-file"></div>
                </section>

                <!-- Result -->
                <section class="panel hidden" id="result-panel">
                    <h2>处理完成</h2>
                    <p id="result-message">标注已完成！</p>
                    <p class="result-path" id="result-path"></p>
                    <button class="btn btn-secondary" id="reset-btn">重新开始</button>
                </section>
            </div>
        </main>

        <footer>
            <p>JZ-AnyLabeling</p>
        </footer>
    </div>

    <script src="/static/js/api-client.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
